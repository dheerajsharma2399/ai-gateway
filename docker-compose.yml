# ─────────────────────────────────────────────────────────────────────────────
# AI Gateway — Oracle ARM64 VPS + Dokploy
#
# Services:
#   OpenChamber WebUI (opencode.mooh.me → port 7802) — browser UI for OpenCode
#   Claude Code UI   (claude.mooh.me   → port 3011) — Claude Code web interface
#
# Data layout on VPS:
#   /home/ubuntu/agents/
#     ├── claude/          → Claude Code auth
#     ├── 9router/         → 9router auth + settings (`db.json`)
#     ├── openchamber/     → OpenChamber config
#     ├── opencode-config/ → OpenCode config
#     ├── opencode/        → OpenCode data
#     └── workspace/       → shared project files
# ─────────────────────────────────────────────────────────────────────────────

services:
  ai-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      pull: true
    image: ai-gateway:local
    container_name: ai-gateway
    restart: unless-stopped
    platform: linux/arm64

    # Keep localhost-only host bindings for local/Tailscale access.
    # Also expose services through Traefik domain routing on dokploy-network.
    ports:
      - "127.0.0.1:7802:7802"
      - "127.0.0.1:3011:3011"
      - "127.0.0.1:20128:20128"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.openchamber.rule=Host(`${OPENCHAMBER_DOMAIN}`)"
      - "traefik.http.routers.openchamber.entrypoints=websecure"
      - "traefik.http.routers.openchamber.tls=true"
      - "traefik.http.routers.openchamber.tls.certresolver=letsencrypt"
      - "traefik.http.routers.openchamber.service=openchamber-svc"
      - "traefik.http.routers.openchamber-http.rule=Host(`${OPENCHAMBER_DOMAIN}`)"
      - "traefik.http.routers.openchamber-http.entrypoints=web"
      - "traefik.http.routers.openchamber-http.middlewares=redirect-to-https@file"
      - "traefik.http.routers.openchamber-http.service=openchamber-svc"
      - "traefik.http.services.openchamber-svc.loadbalancer.server.port=7802"
      - "traefik.http.routers.claudeui.rule=Host(`${CLAUDEUI_DOMAIN:-claude.mooh.me}`)"
      - "traefik.http.routers.claudeui.entrypoints=websecure"
      - "traefik.http.routers.claudeui.tls=true"
      - "traefik.http.routers.claudeui.tls.certresolver=letsencrypt"
      - "traefik.http.routers.claudeui.service=claudeui-svc"
      - "traefik.http.routers.claudeui-http.rule=Host(`${CLAUDEUI_DOMAIN:-claude.mooh.me}`)"
      - "traefik.http.routers.claudeui-http.entrypoints=web"
      - "traefik.http.routers.claudeui-http.middlewares=redirect-to-https@file"
      - "traefik.http.routers.claudeui-http.service=claudeui-svc"
      - "traefik.http.services.claudeui-svc.loadbalancer.server.port=3011"
      - "traefik.http.routers.ninerouter.rule=Host(`${NINETROUTER_DOMAIN:-kilo.mooh.me}`)"
      - "traefik.http.routers.ninerouter.entrypoints=websecure"
      - "traefik.http.routers.ninerouter.tls=true"
      - "traefik.http.routers.ninerouter.tls.certresolver=letsencrypt"
      - "traefik.http.routers.ninerouter.service=ninerouter-svc"
      - "traefik.http.routers.ninerouter-http.rule=Host(`${NINETROUTER_DOMAIN:-kilo.mooh.me}`)"
      - "traefik.http.routers.ninerouter-http.entrypoints=web"
      - "traefik.http.routers.ninerouter-http.middlewares=redirect-to-https@file"
      - "traefik.http.routers.ninerouter-http.service=ninerouter-svc"
      - "traefik.http.services.ninerouter-svc.loadbalancer.server.port=20128"

    networks:
      - dokploy-network


    volumes:
      - /home/ubuntu/agents/claude:/home/ai-gateway/.claude
      - /home/ubuntu/agents/9router:/home/ai-gateway/.9router
      - /home/ubuntu/agents/openchamber:/home/ai-gateway/.config/openchamber
      - /home/ubuntu/agents/opencode-config:/home/ai-gateway/.config/opencode
      - /home/ubuntu/agents/opencode:/home/ai-gateway/.local/share/opencode
      - /home/ubuntu/agents/claude-code-ui:/home/ai-gateway/.claude-code-ui
      - /home/ubuntu/agents/workspace:/workspace

    environment:
      # ── OpenChamber ──────────────────────────────────────────────────────────
      OPENCHAMBER_PORT: "7802"
      OPENCODE_WORKSPACE: "/workspace"

      # ── 9router (for LiteLLM upstream) ─────────────────────────────────────
      NINE_ROUTER_ENABLED: ${NINE_ROUTER_ENABLED:-true}
      NINE_ROUTER_PORT: ${NINE_ROUTER_PORT:-20128}

      # ── Claude Code UI ─────────────────────────────────────────────────────────────────────────────
      CLAUDEUI_PORT: "3011"
      PORT: "3011"
      DATABASE_PATH: /home/ai-gateway/.claude-code-ui/auth.db
      HOST: "0.0.0.0"

      # ── LiteLLM proxy — all providers route through here ─────────────────────
      LITELLM_BASE_URL: ${LITELLM_BASE_URL}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_API_KEY: ${LITELLM_API_KEY}

      # Anthropic (Claude Code uses this) → LiteLLM
      ANTHROPIC_BASE_URL: ${LITELLM_BASE_URL}
      ANTHROPIC_API_KEY: ${LITELLM_MASTER_KEY}

      # OpenAI-compatible (OpenCode) → LiteLLM
      OPENAI_BASE_URL: ${LITELLM_BASE_URL}/v1
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY}

      # Gemini → LiteLLM
      GEMINI_API_KEY: ${LITELLM_MASTER_KEY}
      GOOGLE_GENERATIVEAI_API_URL: ${LITELLM_BASE_URL}/v1

      # Mistral → LiteLLM
      MISTRAL_API_KEY: ${LITELLM_MASTER_KEY}
      MISTRAL_API_URL: ${LITELLM_BASE_URL}/v1

      # Azure → LiteLLM
      AZURE_OPENAI_API_KEY: ${LITELLM_MASTER_KEY}
      AZURE_OPENAI_ENDPOINT: ${LITELLM_BASE_URL}

      # ── OpenCode default model ────────────────────────────────────────────────
      OPENCODE_DEFAULT_MODEL: ${OPENCODE_DEFAULT_MODEL:-drdash/anthropic/claude-3.5-sonnet}

      # ── Claude Code model ─────────────────────────────────────────────────────
      # CLAUDE_MODEL: sonnet

      # ── GitHub MCP server ─────────────────────────────────────────────────────
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN:-}

      # ── Git identity ──────────────────────────────────────────────────────────
      GIT_USER_NAME: ${GIT_USER_NAME:-AI Agent}
      GIT_USER_EMAIL: ${GIT_USER_EMAIL:-agent@localhost}

      # ── Timezone ──────────────────────────────────────────────────────────────
      TZ: Asia/Kolkata

      # ── UI password (optional) ────────────────────────────────────────────────
      UI_PASSWORD: ${UI_PASSWORD:-}

    shm_size: "1gb"

    deploy:
      resources:
        limits:
          memory: 6g
        reservations:
          memory: 512m

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7802"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

networks:
  dokploy-network:
    external: true


